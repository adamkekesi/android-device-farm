{{- if .Values.revProxy.enabled }}
{{- $ns := .Release.Namespace -}}
{{- $f := include "devicefarmer.fullname" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $f }}-revproxy
  labels: {{- include "devicefarmer.labels" (dict "root" . "component" "revproxy") | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    events { worker_connections 1024; }
    http {
      map $http_upgrade $connection_upgrade { default upgrade; '' close; }
      resolver {{ .Values.revProxy.dnsResolver }} valid=10s;
      client_max_body_size 1024m;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      server {
        listen 80;
        location /auth/ {
          proxy_pass http://{{ $f }}-auth.{{ $ns }}.svc.cluster.local:3000/auth/;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /api/ {
          proxy_pass http://{{ $f }}-api.{{ $ns }}.svc.cluster.local:3000/api/;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /s/image/ { proxy_pass http://{{ $f }}-storage-image.{{ $ns }}.svc.cluster.local:3000; }
        location /s/apk/   { proxy_pass http://{{ $f }}-storage-apk.{{ $ns }}.svc.cluster.local:3000; }
        location /s/       { proxy_pass http://{{ $f }}-storage-temp.{{ $ns }}.svc.cluster.local:3000; }
        location /socket.io/ {
          proxy_pass http://{{ $f }}-websocket.{{ $ns }}.svc.cluster.local:3000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        # Per-device screen/input WebSocket -> provider pod on the dynamic port
        # encoded in the URL (headless provider Service + resolver = any port).
        location ~ "^/d/{{ .Values.provider.name }}/[^/]+/(?<dport>[0-9]+)/" {
          proxy_pass http://{{ $f }}-provider.{{ $ns }}.svc.cluster.local:$dport/;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
        }
        location / {
          proxy_pass http://{{ $f }}-app.{{ $ns }}.svc.cluster.local:3000;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Real-IP $remote_addr;
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $f }}-revproxy
  labels: {{- include "devicefarmer.labels" (dict "root" . "component" "revproxy") | nindent 4 }}
spec:
  selector: {{- include "devicefarmer.selectorLabels" (dict "root" . "component" "revproxy") | nindent 4 }}
  ports:
    - { name: http, port: 80, targetPort: 80 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $f }}-revproxy
  labels: {{- include "devicefarmer.labels" (dict "root" . "component" "revproxy") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: {{- include "devicefarmer.selectorLabels" (dict "root" . "component" "revproxy") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ .Values.provider.name | toString | sha256sum }}
      labels: {{- include "devicefarmer.labels" (dict "root" . "component" "revproxy") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: nginx
          image: "{{ .Values.revProxy.image.repository }}:{{ .Values.revProxy.image.tag }}"
          imagePullPolicy: {{ .Values.revProxy.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 80 }
          readinessProbe:
            tcpSocket: { port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - { name: conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf }
          {{- with .Values.revProxy.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: conf
          configMap:
            name: {{ $f }}-revproxy
{{- end }}
