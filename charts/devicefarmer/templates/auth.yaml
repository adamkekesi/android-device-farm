apiVersion: v1
kind: Service
metadata:
  name: {{ include "devicefarmer.fullname" . }}-auth
  labels: {{- include "devicefarmer.labels" (dict "root" . "component" "auth") | nindent 4 }}
spec:
  selector: {{- include "devicefarmer.selectorLabels" (dict "root" . "component" "auth") | nindent 4 }}
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devicefarmer.fullname" . }}-auth
  labels: {{- include "devicefarmer.labels" (dict "root" . "component" "auth") | nindent 4 }}
spec:
  replicas: {{ .Values.components.auth.replicas }}
  selector:
    matchLabels: {{- include "devicefarmer.selectorLabels" (dict "root" . "component" "auth") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "devicefarmer.labels" (dict "root" . "component" "auth") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "devicefarmer.waitForRethinkdb" . | nindent 8 }}
      containers:
        - name: auth
          image: {{ include "devicefarmer.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Mock auth (no external IdP). Swap for auth-oauth2 / auth-ldap later.
          command: ["stf", "auth-mock"]
          args:
            - --port
            - "3000"
            - --app-url
            - {{ printf "%s/" (include "devicefarmer.publicUrl" .) | quote }}
          env:
            {{- include "devicefarmer.rethinkdbEnv" . | nindent 12 }}
            {{- include "devicefarmer.secretEnv" . | nindent 12 }}
          ports:
            - { name: http, containerPort: 3000 }
          readinessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
