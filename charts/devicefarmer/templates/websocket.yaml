apiVersion: v1
kind: Service
metadata:
  name: {{ include "devicefarmer.fullname" . }}-websocket
  labels: {{- include "devicefarmer.labels" (dict "root" . "component" "websocket") | nindent 4 }}
spec:
  selector: {{- include "devicefarmer.selectorLabels" (dict "root" . "component" "websocket") | nindent 4 }}
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devicefarmer.fullname" . }}-websocket
  labels: {{- include "devicefarmer.labels" (dict "root" . "component" "websocket") | nindent 4 }}
spec:
  replicas: {{ .Values.components.websocket.replicas }}
  selector:
    matchLabels: {{- include "devicefarmer.selectorLabels" (dict "root" . "component" "websocket") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "devicefarmer.labels" (dict "root" . "component" "websocket") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "devicefarmer.waitForRethinkdb" . | nindent 8 }}
      containers:
        - name: websocket
          image: {{ include "devicefarmer.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["stf", "websocket"]
          args:
            - --port
            - "3000"
            - --storage-url
            - {{ printf "%s/" (include "devicefarmer.publicUrl" .) | quote }}
            - --connect-sub
            - "tcp://{{ include "devicefarmer.triproxyAppHost" . }}:7150"
            - --connect-push
            - "tcp://{{ include "devicefarmer.triproxyAppHost" . }}:7170"
          env:
            {{- include "devicefarmer.rethinkdbEnv" . | nindent 12 }}
            {{- include "devicefarmer.secretEnv" . | nindent 12 }}
          ports:
            - { name: http, containerPort: 3000 }
          readinessProbe:
            tcpSocket: { port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
