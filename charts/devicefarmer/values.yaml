# DeviceFarmer (STF) control-plane values.
#
# Modelled on DeviceFarmer's distributed (systemd/docker-compose) topology — each
# STF process is its own Deployment, RethinkDB is a StatefulSet, schema migration
# is a post-install/upgrade hook Job, and an Ingress fronts the HTTP services.
# See docs/IMPLEMENTATION_PLAN.md §6 Phase 1.

# Use the maintained devicefarmer/* image (NOT the abandoned openstf/*).
image:
  repository: devicefarmer/stf
  tag: ""                 # defaults to .Chart.appVersion (3.7.7)
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Shared session secret used by app/auth/api/websocket/groups-engine.
secret:
  # If empty, the chart generates a random secret on first install and preserves
  # it across upgrades (via lookup). Do NOT commit a real secret here.
  value: ""
  # Or point at an existing Secret that has a "secret" key.
  existingSecret: ""

# Seeded by `stf migrate` on first install (admin user + root group).
admin:
  name: "administrator"
  email: "admin@example.com"
rootGroupName: "Common"

# Per-component replica counts.
components:
  app: { replicas: 1 }
  auth: { replicas: 1 }
  api: { replicas: 1 }
  websocket: { replicas: 1 }
  processor: { replicas: 1 }
  reaper: { replicas: 1 }
  groupsEngine: { replicas: 1 }
  triproxyApp: { replicas: 1 }
  triproxyDev: { replicas: 1 }
  storageTemp: { replicas: 1 }
  storageApk: { replicas: 1 }
  storageImage: { replicas: 1 }

# Resources applied to STF process containers (override per-need).
resources: {}

# Image used by init containers that wait for RethinkDB.
waitImage: "busybox:1.36"

rethinkdb:
  image:
    repository: rethinkdb
    # Docker Hub publishes 2.4.4 only as the -bookworm-slim variant (no plain 2.4.4).
    tag: "2.4.4-bookworm-slim"
    pullPolicy: IfNotPresent
  cacheSizeMb: 1024
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources: {}

# Persistent storage for stf storage-temp (uploaded artifacts).
storage:
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

# adb server that STF's provider attaches to. The android-device-farm operator
# `adb connect`s each Ready device to this server, and the provider registers it.
adb:
  enabled: true
  image:
    repository: devicefarmer/adb
    tag: "latest"
    pullPolicy: IfNotPresent
  # Name of a Secret holding `adbkey` (private) used to authenticate to
  # Play-certified emulators that enforce adb auth. Empty = no key (fine for
  # userdebug/AOSP images). Create it from the farm key, e.g.:
  #   kubectl -n devicefarmer create secret generic devicefarmer-adb-key \
  #     --from-file=adbkey=images/android-emulator/adbkeys/adbkey
  adbKeySecret: ""
  resources: {}

# STF provider: bridges adb devices into STF over the dev-side triproxy and serves
# the per-device screen/input WebSocket on a port range. --allow-remote lets it
# accept TCP-connected emulators.
provider:
  enabled: true
  name: k8s
  minPort: 15000
  maxPort: 15100
  resources: {}

# Physical-device provider. Two modes:
#
#   * USB DaemonSet (enabled=false by default) — for real cluster nodes that have
#     handsets cabled in: a DaemonSet on USB-host nodes runs adb with /dev/bus/usb
#     passed through and registers attached devices. Needs real USB-host hardware.
#
#   * networkDevices (the path for kind/dev and any device reachable over the LAN) —
#     STF's adb server lives in-cluster and can only reach a phone over TCP, so we
#     attach devices via wireless adb (`adb tcpip 5555`; see hack/phone-prep.sh). Each
#     entry below is reconciled by an in-cluster agent Deployment that upserts the
#     physical Device CR AND keeps `adb connect <adbEndpoint>` alive, so the device
#     re-attaches automatically after an adb-server/cluster restart (the operator's
#     one-shot registration Job can't do that). For non-interactive reconnect, also
#     pin adb.adbKeySecret and authorize that key once on the phone.
physicalProvider:
  enabled: false
  nodeSelector:
    farm.example.com/usb-host: "true"
  # DeviceClass (providerType: physical) USB-discovered devices are registered under.
  deviceClass: physical-pixel
  # adb endpoint advertised for USB-discovered devices. Remote adb reachability is
  # environment-specific; leave empty to advertise the raw serial.
  adbHostOverride: ""
  # Wireless-adb devices reconciled by the in-cluster network agent. Example:
  #   networkDevices:
  #     - name: pixel7              # short name; Device CR is phys-<name>
  #       adbEndpoint: 192.168.1.50:5555
  #       class: physical-pixel     # a DeviceClass with providerType: physical
  #       poolRef: physical-pool     # a DevicePool whose stfRef.adbHost is set
  networkDevices: []
  # How often the network agent re-applies the CR and re-issues `adb connect`.
  reconnectIntervalSeconds: 15
  # Screen power management the physical-net agent applies to each networkDevice:
  #   leased - keep the screen awake ONLY while the device is leased OR actively
  #            viewed in STF (minicap running); let it sleep when idle (default)
  #   always - keep the screen awake whenever the device is charging
  #   none   - don't touch screen power (device defaults / STF decide)
  # Pair with hack/phone-prep.sh, which sets a sleep-when-idle baseline.
  screenPower: leased
  resources: {}

# Reverse proxy (STF's nginx model). Fronts all STF routing INCLUDING the dynamic
# per-device screen/input WebSockets (/d/<provider>/<serial>/<port>/) needed for
# in-browser device control — which a plain Ingress cannot route. When enabled,
# the Ingress points at this proxy instead of doing per-path routing itself.
revProxy:
  enabled: true
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  # Cluster DNS IP for nginx's resolver (kube-dns/coredns). kind default below.
  dnsResolver: "10.96.0.10"
  resources: {}

# adb-registrar: an in-cluster agent that registers the farm's emulators with your
# HOST adb server, so they show up in your local `adb devices` automatically — no
# port-forward. It relies on the device adb Services being NodePort (the operator
# sets that) and on your host adb server listening on the kind network. Run the
# host server in network mode once: `adb kill-server && adb -a -P 5037 nodaemon server`
# (or `ADB_SERVER_SOCKET=tcp:0.0.0.0:5037 adb start-server`). See docs/runbook.md.
adbRegistrar:
  enabled: true
  # Your host's adb server as reachable from inside the cluster. Default is the kind
  # Docker-network gateway (= your machine); port is the adb server port.
  hostADB:
    host: "172.20.0.1"
    port: 5037
  syncIntervalSeconds: 5
  # Image for the kubectl "watcher" container (needs kubectl + a shell).
  watcherImage:
    repository: alpine/k8s
    tag: "1.31.13"
    pullPolicy: IfNotPresent
  # The "driver" container reuses the adb image (.Values.adb.image).
  resources: {}

ingress:
  enabled: true
  # Gateway API if available on the target cluster, otherwise ingress-nginx.
  # Do NOT introduce Traefik v1 CRDs.
  className: "nginx"
  # host is the Ingress routing host (Host header match). For local kind with a
  # published port, set host: localhost and externalURL: http://localhost:8080.
  host: stf.local
  # externalURL overrides the public URL STF advertises (login/websocket/storage);
  # set it when the access URL includes a port. Empty = derive from scheme+host.
  externalURL: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  tls:
    enabled: false
    secretName: ""

podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
