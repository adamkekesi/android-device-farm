# DeviceFarmer (STF) control-plane values.
#
# Modelled on DeviceFarmer's distributed (systemd/docker-compose) topology — each
# STF process is its own Deployment, RethinkDB is a StatefulSet, schema migration
# is a post-install/upgrade hook Job, and an Ingress fronts the HTTP services.
# See docs/IMPLEMENTATION_PLAN.md §6 Phase 1.

# Use the maintained devicefarmer/* image (NOT the abandoned openstf/*).
image:
  repository: devicefarmer/stf
  tag: ""                 # defaults to .Chart.appVersion (3.7.7)
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Shared session secret used by app/auth/api/websocket/groups-engine.
secret:
  # If empty, the chart generates a random secret on first install and preserves
  # it across upgrades (via lookup). Do NOT commit a real secret here.
  value: ""
  # Or point at an existing Secret that has a "secret" key.
  existingSecret: ""

# Seeded by `stf migrate` on first install (admin user + root group).
admin:
  name: "administrator"
  email: "admin@example.com"
rootGroupName: "Common"

# Per-component replica counts.
components:
  app: { replicas: 1 }
  auth: { replicas: 1 }
  api: { replicas: 1 }
  websocket: { replicas: 1 }
  processor: { replicas: 1 }
  reaper: { replicas: 1 }
  groupsEngine: { replicas: 1 }
  triproxyApp: { replicas: 1 }
  triproxyDev: { replicas: 1 }
  storageTemp: { replicas: 1 }
  storageApk: { replicas: 1 }
  storageImage: { replicas: 1 }

# Resources applied to STF process containers (override per-need).
resources: {}

# Image used by init containers that wait for RethinkDB.
waitImage: "busybox:1.36"

rethinkdb:
  image:
    repository: rethinkdb
    # Docker Hub publishes 2.4.4 only as the -bookworm-slim variant (no plain 2.4.4).
    tag: "2.4.4-bookworm-slim"
    pullPolicy: IfNotPresent
  cacheSizeMb: 1024
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources: {}

# Persistent storage for stf storage-temp (uploaded artifacts).
storage:
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

# adb server that STF's provider attaches to. The android-device-farm operator
# `adb connect`s each Ready device to this server, and the provider registers it.
adb:
  enabled: true
  image:
    repository: devicefarmer/adb
    tag: "latest"
    pullPolicy: IfNotPresent
  resources: {}

# STF provider: bridges adb devices into STF over the dev-side triproxy and serves
# the per-device screen/input WebSocket on a port range. --allow-remote lets it
# accept TCP-connected emulators.
provider:
  enabled: true
  name: k8s
  minPort: 15000
  maxPort: 15100
  resources: {}

# Physical-device provider (Phase 6, future-ready). A DaemonSet on USB-host nodes
# runs adb and registers attached devices as physical Device CRs that flow through
# the same lease/health contract. Requires real USB hardware; disabled by default.
physicalProvider:
  enabled: false
  nodeSelector:
    farm.example.com/usb-host: "true"
  # DeviceClass (providerType: physical) discovered devices are registered under.
  deviceClass: physical-pixel
  # adb endpoint advertised for discovered devices. Remote adb reachability for
  # physical devices is environment-specific (USB host networking); leave empty to
  # advertise the raw serial.
  adbHostOverride: ""
  resources: {}

# Reverse proxy (STF's nginx model). Fronts all STF routing INCLUDING the dynamic
# per-device screen/input WebSockets (/d/<provider>/<serial>/<port>/) needed for
# in-browser device control — which a plain Ingress cannot route. When enabled,
# the Ingress points at this proxy instead of doing per-path routing itself.
revProxy:
  enabled: true
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  # Cluster DNS IP for nginx's resolver (kube-dns/coredns). kind default below.
  dnsResolver: "10.96.0.10"
  resources: {}

ingress:
  enabled: true
  # Gateway API if available on the target cluster, otherwise ingress-nginx.
  # Do NOT introduce Traefik v1 CRDs.
  className: "nginx"
  # host is the Ingress routing host (Host header match). For local kind with a
  # published port, set host: localhost and externalURL: http://localhost:8080.
  host: stf.local
  # externalURL overrides the public URL STF advertises (login/websocket/storage);
  # set it when the access URL includes a port. Empty = derive from scheme+host.
  externalURL: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  tls:
    enabled: false
    secretName: ""

podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
